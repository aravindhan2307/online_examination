<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartExam History - Logs</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="history-body">
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Navigation Header -->
    <header class="exam-navbar">
        <div class="navbar-brand">
            <a href="index.html" class="nav-back-link"><i class="fa-solid fa-arrow-left"></i></a>
            <span><i class="fa-solid fa-clock-history"></i> SmartExam Results Logs</span>
        </div>
        <div class="navbar-status" style="display: flex; gap: 10px; align-items: center;">
            <span class="badge success-badge"><i class="fa-solid fa-server"></i> Logs Active</span>
            <a href="arrear.html" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; color:#f87171; border-color:rgba(239,68,68,.35);">
                <i class="fa-solid fa-triangle-exclamation"></i> Arrear Students
            </a>
            <a href="/logout" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </header>

    <main class="container history-container">
        <!-- Results History Board Card -->
        <div class="glass-card fade-in">
            <div class="admin-header-flex">
                <h2>Assessment Logs Database</h2>
                <button type="button" id="refreshLogsBtn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">
                    <i class="fa-solid fa-arrows-rotate"></i> Refresh
                </button>
            </div>

            <!-- Logs Table -->
            <div class="table-responsive" style="margin-top: 20px;">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">ID</th>
                            <th>Candidate Name</th>
                            <th>Topic</th>
                            <th style="width: 140px; text-align: center;">Score</th>
                            <th style="width: 140px; text-align: center;">Percentage</th>
                            <th>Submission Time</th>
                            <th style="width: 100px; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="7" class="text-center">Loading exam logs from database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 SmartExam System. All rights reserved.</p>
    </footer>

    <!-- App JS -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initHistoryPage();
        });
    </script>
</body>
</html>
