<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartExam Admin - Manage Questions</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
    </div>

    <!-- Navigation Header -->
    <header class="exam-navbar">
        <div class="navbar-brand">
            <a href="index.html" class="nav-back-link"><i class="fa-solid fa-arrow-left"></i></a>
            <span><i class="fa-solid fa-database"></i> SmartExam Database Manager</span>
        </div>
        <div class="navbar-status" style="display: flex; gap: 10px; align-items: center;">
            <button type="button" id="addNewBtn" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">
                <i class="fa-solid fa-plus"></i> Add New Question
            </button>
            <a href="/logout" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </header>

    <main class="container admin-container">
        <!-- Question list card -->
        <div class="glass-card fade-in">
            <div class="admin-header-flex">
                <h2>Questions Repository</h2>
                <div class="filter-group">
                    <label for="categoryFilter"><i class="fa-solid fa-filter"></i> Filter:</label>
                    <select id="categoryFilter" class="small-select">
                        <option value="all">All Topics</option>
                        <option value="java">Java Programming</option>
                        <option value="web">Web Development</option>
                        <option value="general">General Knowledge</option>
                    </select>
                </div>
            </div>

            <!-- Questions Table -->
            <div class="table-responsive">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th style="width: 60px;">ID</th>
                            <th style="width: 140px;">Category</th>
                            <th>Question Details</th>
                            <th style="width: 150px;">Answer Key</th>
                            <th style="width: 130px; text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="questionsTableBody">
                        <tr>
                            <td colspan="5" class="text-center">Loading questions from database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for Create/Update Question -->
    <div class="modal-overlay hidden" id="questionModal">
        <div class="glass-card modal-content admin-modal fade-in">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Question</h2>
                <button type="button" class="close-modal-btn" id="closeModalBtn">&times;</button>
            </div>
            
            <form id="questionForm">
                <input type="hidden" id="questionId">
                
                <div class="input-group">
                    <label for="questionCategory">Category</label>
                    <select id="questionCategory" required>
                        <option value="java">Java Programming</option>
                        <option value="web">Web Development (HTML/CSS/JS)</option>
                        <option value="general">General Knowledge</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="questionText">Question Text</label>
                    <input type="text" id="questionText" required placeholder="Enter the question text" autocomplete="off">
                </div>

                <div class="options-grid">
                    <div class="input-group">
                        <label for="optionA">Option A</label>
                        <input type="text" id="optionA" required placeholder="Option A value" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="optionB">Option B</label>
                        <input type="text" id="optionB" required placeholder="Option B value" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="optionC">Option C</label>
                        <input type="text" id="optionC" required placeholder="Option C value" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="optionD">Option D</label>
                        <input type="text" id="optionD" required placeholder="Option D value" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="correctOption">Correct Option Index</label>
                    <select id="correctOption" required>
                        <option value="0">Option A</option>
                        <option value="1">Option B</option>
                        <option value="2">Option C</option>
                        <option value="3">Option D</option>
                    </select>
                </div>

                <div class="modal-actions" style="margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" id="cancelFormBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveQuestionBtn">Save Question</button>
                </div>
            </form>
        </div>
    </div>

    <!-- App JS -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAdminPage();
        });
    </script>
</body>
</html>
