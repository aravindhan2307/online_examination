spring.application.name=online-examination-app
server.port=8080

# In-Memory Database for Zero-Configuration Setup (Recommended for beginners)
spring.datasource.url=jdbc:h2:mem:online_exam_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Uncomment below to switch to MySQL (make sure to create database 'online_exam_db' first)
# spring.datasource.url=jdbc:mysql://localhost:3306/online_examination_db
# spring.datasource.username=exam
# spring.datasource.password=exam
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update